apiVersion: v1
kind: Pod
metadata:
  name: sysiphos-worker
spec:
  restartPolicy: Never

  volumes:
    # Main repo — read-only so the agent can't touch the canonical history
    - name: repo-ro
      hostPath:
        path: /r/priv/sysiphoss   # adjust to actual repo root on host
        type: Directory
    # Worktree — read-write, isolated per run
    - name: worktree-rw
      hostPath:
        path: /r/priv/sysiphoss-worktree   # created by the host before pod start
        type: DirectoryOrCreate
    # Shared todos — both worker and sidecar read/write here
    - name: todos-shared
      hostPath:
        path: /r/priv/sysiphoss/.todos
        type: DirectoryOrCreate

  containers:
    # ── Worker ──────────────────────────────────────────────────────────────
    - name: worker
      image: sysiphos-agent:latest
      imagePullPolicy: Never
      command: ["/bin/bash", "-c", "sleep infinity"]  # replaced by actual agent entrypoint
      env:
        - name: GH_LOCAL_BASE
          value: "main"
        - name: TD_ROOT
          value: "/todos"
      volumeMounts:
        - name: repo-ro
          mountPath: /repo
          readOnly: true
        - name: worktree-rw
          mountPath: /workspace
        - name: todos-shared
          mountPath: /todos

    # ── Test / Sidecar placeholder ───────────────────────────────────────
