name: release

# Build and publish the .deb whenever a semver tag (vMAJOR.MINOR.PATCH) is pushed
# — e.g. by `make release <major|minor|patch>`.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write # create the GitHub release and upload the .deb

# Versions of the bundled tools (go install-able). Bump alongside the image.
env:
  TD_VERSION: v0.45.0
  YQ_VERSION: v4.53.3

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stage bundled tools (td, yq) onto PATH
        run: |
          go install "github.com/marcus/td@${TD_VERSION}"
          go install "github.com/mikefarah/yq/v4@${YQ_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build the .deb
        run: make deb VERSION="${GITHUB_REF_NAME#v}"

      - name: Publish the release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/sindri_*_amd64.deb # the versioned package (one asset)
          generate_release_notes: true
